name: Feature Task
description: 建立一張 multi-agent 工作流的功能任務卡
title: "[XX-NNN] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        > 本 template 為 multi-agent 工作流使用。請完整填寫欄位，Orchestrator 會根據內容進行需求淨化、分級與路由。

  - type: textarea
    id: problem-statement
    attributes:
      label: 問題陳述 (Problem Statement)
      description: 以業務痛點或物理限制描述為什麼需要這張卡，避免「業界通常這樣做」的理由。
      placeholder: 例：商家無法快速查看今日剩餘庫存，導致超賣風險。
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 驗收標準 (Acceptance Criteria)
      description: 以 BDD / Given-When-Then 或可量化條件列出交付驗收門檻。
      placeholder: |
        - Given 商家已發布當日菜單
        - When 客戶扣除超過剩餘庫存
        - Then 回傳 409 且 remaining_qty 不變
    validations:
      required: true

  - type: textarea
    id: in-scope
    attributes:
      label: Scope 內
      description: 明確列出本卡涵蓋範圍，避免 scope creep。
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Scope 外
      description: 明確列出本卡不處理的項目，避免下游 agent 誤會。
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: 依賴關係 (Dependencies)
      description: 若有依賴其他 issue，使用 `depends-on: #N` 語法逐行列出。Orchestrator 會用這個欄位判斷是否能進 `status:ready`。
      placeholder: |
        depends-on: #41
        depends-on: #42
    validations:
      required: false

  - type: checkboxes
    id: security-tags
    attributes:
      label: 安全標籤 (Security Tags)
      description: 由 Orchestrator 進行需求淨化時勾選，SA/SD 須對勾選項目產出安全設計。
      options:
        - label: 涉及認證／授權
        - label: 涉及敏感資料處理
        - label: 涉及外部輸入
        - label: 涉及不可逆操作

  - type: checkboxes
    id: human-collaboration
    attributes:
      label: 外部協作需求 (Human-in-the-Loop) — 三層漏斗判斷
      description: |
        由 Orchestrator 於需求淨化時套用。任一層命中即拆出 `cap:human` 子 issue 並以 `depends-on` 鎖住後續任務。詳細判準見 ADR-001。
      options:
        - label: 第一層（能不能做）— 需實體設備／法律身份／外部帳號／金錢支出／實體訪談
        - label: 第二層（該不該做）— 不可逆決策／品牌形象／法規／美感／跨角色共識
        - label: 第三層（敢不敢做）— 需求模糊／缺測試資料／缺真實環境／驗收標準不清

  - type: textarea
    id: handoff-contract
    attributes:
      label: Agent Handoff Contract（啟動包）
      description: 由 SA/SD 填寫。包含輸入契約、輸出契約、變更檔案清單、相關 ADR 連結。
      placeholder: |
        - 輸入：Redis 草稿 Session（P3-001 產出）
        - 輸出：PostgreSQL published_menus row + Redis cache
        - 變更檔案：見 docs/specs/P3-002-publish-inventory-spec.md §11
        - 相關 ADR：docs/specs/adr/ADR-00X-*.md
    validations:
      required: false

  - type: input
    id: task-level
    attributes:
      label: 任務分級 (L0 / L1 / L2 / L3)
      description: 由 Orchestrator 判定。L0=外部阻塞、L1=輕量、L2=標準、L3=複雜。
      placeholder: 例：L3
    validations:
      required: false
